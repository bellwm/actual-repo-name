name: Validate Reports and Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ '**' ]

jobs:
  test-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests jsonschema python-dotenv pytest responses

      - name: Run unit tests
        run: |
          pytest -q

      - name: Generate schema from sample (optional)
        run: |
          python validate_output.py --generate-from reports/example_report.json || true

      - name: Validate reports lenient
        run: |
          python validate_output.py reports || true

  strict-validate:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: test-and-validate
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests jsonschema python-dotenv

      - name: Validate reports strict
        env:
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          MEMORY_SERVICE_URL: ${{ secrets.MEMORY_SERVICE_URL }}
        run: |
          python validate_output.py --strict reports || exit 1
